<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Daily Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer onload="onGsiLoad()"></script>
<style>
  :root{
    --bg:#12141c; --surface:#1a1e2b; --surface-2:#222839; --surface-3:#2a3142;
    --text:#f0ede6; --text-dim:#9aa0b4; --line:rgba(240,237,230,0.09);
    --amber:#e8a94d; --rose:#d4667a; --sage:#7faa8c; --blue:#6e9bc7;
    --violet:#9b87c4; --teal:#5fb3b3; --gold:#d4a24c; --gray:#8a8f9c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; overflow-x:hidden;}
  button,input,select,textarea{font-family:inherit;}

  .topbar{
    position:sticky; top:0; z-index:20; background:rgba(18,20,28,0.92); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px; padding:14px 18px;
  }
  .hamburger{width:34px; height:34px; border-radius:9px; background:var(--surface-2); border:1px solid var(--line);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; cursor:pointer; flex:none;}
  .hamburger span{width:16px; height:1.5px; background:var(--text); transition:transform .2s, opacity .2s;}
  .hamburger.open span:nth-child(1){transform:translateY(5.5px) rotate(45deg);}
  .hamburger.open span:nth-child(2){opacity:0;}
  .hamburger.open span:nth-child(3){transform:translateY(-5.5px) rotate(-45deg);}
  .topbar-title{font-family:'Fraunces',serif; font-weight:600; font-size:17px;}
  .topbar-title em{font-style:normal; color:var(--amber);}
  .topbar-sub{margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); text-align:right;}
  .sync-dot{width:7px; height:7px; border-radius:50%; background:var(--sage); display:inline-block; margin-right:5px;}
  .sync-dot.busy{background:var(--amber); animation:pulse 1s infinite;}
  .sync-dot.err{background:var(--rose);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  .overlay{position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:29; opacity:0; pointer-events:none; transition:opacity .2s;}
  .overlay.show{opacity:1; pointer-events:auto;}
  .drawer{position:fixed; top:0; left:0; bottom:0; width:min(78vw,290px); background:var(--surface);
    border-right:1px solid var(--line); z-index:30; transform:translateX(-100%); transition:transform .22s ease;
    padding:20px 16px; display:flex; flex-direction:column; gap:4px;}
  .drawer.open{transform:translateX(0);}
  .drawer-title{font-family:'Fraunces',serif; font-weight:600; font-size:19px; margin-bottom:18px; padding:0 6px;}
  .drawer a{display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:10px; color:var(--text);
    text-decoration:none; font-size:14px; cursor:pointer;}
  .drawer a:hover, .drawer a.active{background:var(--surface-2);}
  .drawer a.active{color:var(--amber);}
  .drawer .icon{width:20px; text-align:center;}
  .drawer .spacer{flex:1;}

  main{max-width:760px; margin:0 auto; padding:20px 18px 70px;}
  .page-title{font-family:'Fraunces',serif; font-weight:600; font-size:24px; margin:4px 0 4px;}
  .page-sub{color:var(--text-dim); font-size:12.5px; margin-bottom:18px;}

  .card{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:16px;}
  .card h3{font-family:'Fraunces',serif; font-weight:600; font-size:14px; margin:0 0 12px; color:var(--text-dim);}

  .stat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px;}
  .stat-box{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:14px 10px; text-align:center;}
  .stat-num{font-family:'JetBrains Mono',monospace; font-size:24px; color:var(--amber);}
  .stat-label{font-size:11px; color:var(--text-dim); margin-top:4px;}
  .shortcut-row{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
  .shortcut{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:16px 10px; text-align:center; cursor:pointer; font-size:12.5px; color:var(--text);}
  .shortcut .emoji{font-size:22px; display:block; margin-bottom:6px;}
  .shortcut:hover{border-color:var(--amber);}

  .add-bar{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:16px;}
  .add-bar input[type=text]{flex:1; min-width:140px; background:var(--surface-2); border:1px solid var(--line); border-radius:9px; padding:10px 12px; color:var(--text); font-size:13.5px;}
  .add-bar select, .add-bar input[type=date]{background:var(--surface-2); border:1px solid var(--line); border-radius:9px; color:var(--text); padding:10px 8px; font-size:13px;}
  .add-bar label.star{display:flex; align-items:center; gap:4px; font-size:12px; color:var(--text-dim); cursor:pointer; white-space:nowrap;}
  .add-bar button.add-btn{background:var(--amber); border:none; border-radius:9px; padding:10px 18px; font-weight:600; color:#1a1408; cursor:pointer; font-size:13px;}
  input,select{outline:none;}
  input:focus, select:focus{border-color:var(--amber);}
  @media (max-width:480px){ .add-bar{flex-direction:column; align-items:stretch;} .add-bar select, .add-bar input[type=date]{width:100%;} }

  .tabs{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; align-items:center;}
  .tab{padding:6px 13px; border-radius:999px; border:1px solid var(--line); background:var(--surface); font-size:12.5px; cursor:pointer; color:var(--text-dim); display:flex; align-items:center; gap:6px;}
  .tab.active{color:var(--text); border-color:var(--amber); background:var(--surface-2);}
  .tab .dot{width:8px; height:8px; border-radius:50%;}
  .gear-btn{margin-left:auto; background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:6px 12px; font-size:12px; color:var(--text-dim); cursor:pointer;}
  .cat-manage{display:none; margin-bottom:14px;}
  .cat-manage.show{display:block;}
  .cat-list{display:flex; flex-direction:column; gap:8px; margin-bottom:12px;}
  .cat-row{display:flex; align-items:center; gap:10px; background:var(--surface-2); border-radius:9px; padding:8px 10px;}
  .cat-row .dot{width:12px; height:12px; border-radius:50%; flex:none;}
  .cat-row input.cat-name{background:transparent; border:none; color:var(--text); font-size:13px; flex:1; padding:2px 4px;}
  .cat-row input.cat-name:focus{background:var(--surface-3); border-radius:5px;}
  .cat-row .del-cat{background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:13px;}
  .cat-row .del-cat:hover{color:var(--rose);}
  .swatches{display:flex; gap:6px; flex-wrap:wrap; margin:8px 0;}
  .swatch{width:20px; height:20px; border-radius:50%; cursor:pointer; border:2px solid transparent;}
  .swatch.sel{border-color:var(--text);}
  .new-cat-row{display:flex; gap:8px; align-items:center;}
  .new-cat-row input{flex:1; background:var(--surface-2); border:1px solid var(--line); border-radius:8px; color:var(--text); padding:8px 10px; font-size:12.5px;}
  .new-cat-row button{background:var(--surface-2); border:1px solid var(--line); color:var(--text-dim); border-radius:8px; padding:8px 12px; cursor:pointer; font-size:12px;}

  .task{background:var(--surface-2); border-radius:10px; padding:10px 11px; margin-bottom:8px; display:flex; align-items:flex-start; gap:9px; border-left:3px solid transparent;}
  .task.done{opacity:.42;}
  .task.done .task-text{text-decoration:line-through;}
  .check{width:17px; height:17px; border-radius:5px; border:1.5px solid var(--text-dim); flex:none; margin-top:2px; cursor:pointer; background:transparent; display:flex; align-items:center; justify-content:center; font-size:11px;}
  .task-body{flex:1; min-width:0;}
  .task-text{font-size:13.5px; line-height:1.4; word-break:break-word;}
  .task-meta{font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--text-dim); margin-top:3px;}
  .task-del{background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:14px;}
  .task-del:hover{color:var(--rose);}
  .empty{color:var(--text-dim); font-size:12.5px; font-style:italic; padding:10px 2px;}

  .pomo-label-input{width:100%; background:var(--surface-2); border:1px solid var(--line); border-radius:9px; color:var(--text); padding:10px 12px; font-size:13.5px; margin-bottom:16px;}
  .pomo-mode{text-align:center; font-size:11.5px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; letter-spacing:1px;}
  .pomo-time{font-family:'JetBrains Mono',monospace; font-size:52px; text-align:center; margin:6px 0 16px;}
  .pomo-btns{display:flex; gap:10px; justify-content:center; margin-bottom:6px;}
  .pomo-btns button{background:var(--surface-2); border:1px solid var(--line); color:var(--text); border-radius:9px; padding:10px 20px; cursor:pointer; font-size:13px;}
  .pomo-btns button.primary{background:var(--amber); color:#1a1408; border:none; font-weight:600;}
  .pomo-session{background:var(--surface-2); border-radius:9px; padding:9px 11px; margin-bottom:7px; font-size:12.5px; display:flex; justify-content:space-between; gap:8px;}
  .pomo-session .t{color:var(--text-dim); font-family:'JetBrains Mono',monospace; font-size:11px; white-space:nowrap;}

  .habit-row{display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap;}
  .habit-name{flex:1; min-width:70px; font-size:13px;}
  .habit-grid{display:flex; gap:3px;}
  .habit-cell{width:18px; height:18px; border-radius:5px; background:var(--surface-2); border:1px solid var(--line); cursor:pointer;}
  .habit-cell.on{background:var(--sage); border-color:var(--sage);}
  .habit-cell.today{box-shadow:0 0 0 1.5px var(--amber);}
  .streak{font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--amber); width:34px; text-align:right;}
  .del-habit{background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:13px;}
  .add-habit{display:flex; gap:8px;}
  .add-habit input{flex:1; background:var(--surface-2); border:1px solid var(--line); border-radius:9px; color:var(--text); padding:9px 11px; font-size:13px;}
  .add-habit button{background:var(--amber); border:none; color:#1a1408; font-weight:600; border-radius:9px; padding:9px 16px; cursor:pointer; font-size:13px;}

  .hist-item{display:flex; gap:11px; align-items:flex-start; padding:10px 2px; border-bottom:1px solid var(--line);}
  .hist-item:last-child{border-bottom:none;}
  .hist-icon{width:30px; height:30px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:14px; flex:none;}
  .hist-body{flex:1; min-width:0;}
  .hist-text{font-size:13px;}
  .hist-time{font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--text-dim); margin-top:2px;}

  .note-area{width:100%; min-height:70px; background:var(--surface-2); border:1px solid var(--line); border-radius:9px; color:var(--text); font-size:12.5px; padding:10px; resize:vertical;}
  .loading{color:var(--text-dim); font-size:13px; padding:60px 20px; text-align:center;}

  /* ---- Calendar page ---- */
  .cal-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .cal-nav button{background:var(--surface); border:1px solid var(--line); color:var(--text); border-radius:9px; padding:7px 12px; cursor:pointer; font-size:13px;}
  .cal-month-label{font-family:'Fraunces',serif; font-weight:600; font-size:16px;}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px;}
  .cal-dow{text-align:center; font-size:10.5px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; padding-bottom:4px;}
  .cal-cell{background:var(--surface-2); border-radius:9px; min-height:56px; padding:5px 5px 6px; cursor:pointer; border:1.5px solid transparent; position:relative;}
  .cal-cell.empty{background:transparent; cursor:default;}
  .cal-cell.today{border-color:var(--amber);}
  .cal-cell.selected{background:var(--surface-3);}
  .cal-daynum{font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--text-dim);}
  .cal-dots{display:flex; flex-wrap:wrap; gap:2px; margin-top:4px;}
  .cal-dots .d{width:6px; height:6px; border-radius:50%;}
  .cal-evt-mark{position:absolute; top:5px; right:6px; font-size:8px;}
  @media (max-width:480px){ .cal-cell{min-height:44px; padding:4px;} .cal-daynum{font-size:10px;} }

  .day-detail{margin-top:16px;}
  .day-detail-title{font-family:'Fraunces',serif; font-weight:600; font-size:15px; margin-bottom:10px;}
  .cal-evt-row{background:var(--surface-2); border-radius:9px; padding:8px 10px; margin-bottom:7px; font-size:12.5px; display:flex; justify-content:space-between; gap:8px;}
  .cal-evt-row .t{color:var(--text-dim); font-family:'JetBrains Mono',monospace; font-size:11px; white-space:nowrap;}
  .cal-evt-row.google{border-left:3px solid var(--violet);}

  /* ---- Settings ---- */
  .field-label{font-size:12px; color:var(--text-dim); margin-bottom:5px; display:block;}
  .field-input{width:100%; background:var(--surface-2); border:1px solid var(--line); border-radius:9px; color:var(--text); padding:10px 12px; font-size:13px; margin-bottom:14px;}
  .setup-steps{font-size:12.5px; color:var(--text-dim); line-height:1.9;}
  .setup-steps code{background:var(--surface-2); padding:1px 6px; border-radius:5px; color:var(--amber); font-family:'JetBrains Mono',monospace; font-size:11.5px;}
  .banner{background:var(--rose); color:#2a1015; border-radius:9px; padding:10px 14px; font-size:12.5px; margin-bottom:14px;}

  .gate{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
  .gate-card{background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:36px 30px; max-width:360px; text-align:center;}
  .gate-title{font-family:'Fraunces',serif; font-weight:600; font-size:22px; margin-bottom:8px;}
  .gate-sub{color:var(--text-dim); font-size:13px; margin-bottom:24px; line-height:1.6;}
  .gate-btn-wrap{display:flex; justify-content:center;}
  .whoami{display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text-dim);}
  .logout-btn{background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:11px; text-decoration:underline; margin-left:6px;}
</style>
</head>
<body>

<div id="gateScreen" class="gate">
  <div class="gate-card">
    <div class="gate-title">Daily Hub</div>
    <div class="gate-sub" id="gateMessage">请使用 Google 账号登入</div>
    <div class="gate-btn-wrap" id="gSignInBtn"></div>
  </div>
</div>

<div id="appShell" style="display:none;">
  <div class="topbar">
    <div class="hamburger" id="hamburgerBtn" onclick="toggleDrawer()"><span></span><span></span><span></span></div>
    <div class="topbar-title">Daily <em>Hub</em></div>
    <div class="topbar-sub"><span class="sync-dot" id="syncDot"></span><span id="syncLabel">已同步</span></div>
  </div>
  <div class="overlay" id="overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-title">Daily Hub</div>
    <a data-route="home" onclick="navigate('home')"><span class="icon">🏠</span> 首页</a>
    <a data-route="tasks" onclick="navigate('tasks')"><span class="icon">✅</span> 任务</a>
    <a data-route="calendar" onclick="navigate('calendar')"><span class="icon">📅</span> 日历</a>
    <a data-route="pomodoro" onclick="navigate('pomodoro')"><span class="icon">⏱️</span> 番茄钟</a>
    <a data-route="habits" onclick="navigate('habits')"><span class="icon">🔥</span> 习惯打卡</a>
    <a data-route="history" onclick="navigate('history')"><span class="icon">🕘</span> 历史记录</a>
    <div class="spacer"></div>
    <div class="whoami" id="whoamiBox"></div>
    <a data-route="settings" onclick="navigate('settings')"><span class="icon">⚙️</span> 设置</a>
  </div>
  <main id="app"><div class="loading">加载中...</div></main>
</div>

<script>
// 换成你在 Google Cloud Console 建立的 OAuth Client ID（跟 Code.gs 里的 OAUTH_CLIENT_ID 必须一致）
const CLIENT_ID = '332593136984-sc0ot052islpisbd1f40ejdksdp5bsgi.apps.googleusercontent.com';
// 换成你部署 Apps Script 拿到的网址（结尾 /exec）。写死在这里之后，
// 换新设备/浏览器登入完会直接生效，不用再手动贴一次。
const DEFAULT_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbx2Nrp-jKp0wnIu4HyQYj2uLqv0e7iHuRznVYMNw-3bcPMDzv7eTcluSSpRNVDUz30iYA/exec';
const CONFIG_KEY = 'daily-hub-config';
const PALETTE = [
  {name:'amber', hex:'#e8a94d'}, {name:'rose', hex:'#d4667a'}, {name:'sage', hex:'#7faa8c'},
  {name:'blue', hex:'#6e9bc7'}, {name:'violet', hex:'#9b87c4'}, {name:'teal', hex:'#5fb3b3'},
  {name:'gold', hex:'#d4a24c'}, {name:'gray', hex:'#8a8f9c'}
];

let config = { url: DEFAULT_WEB_APP_URL };
let idToken = null;
let userEmail = null;
let state = { tasks:[], categories:[], habits:[], notes:{}, pomodoroLog:[] };
let route = 'home';
let pomoInterval=null, pomoSeconds=25*60, pomoMode='focus', pomoRunning=false, pomoLabel='';
let taskFilter='all';
let newCatColor = PALETTE[4].hex;
let calVisibleMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
let calSelectedDate = todayKey();
let calEventsCache = {};

function uid(){ return Math.random().toString(36).slice(2,9); }
function todayKey(d=new Date()){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ================= Config (local override, falls back to hardcoded default) ================= */
async function loadConfig(){
  try{
    const raw = localStorage.getItem(CONFIG_KEY);
    config = raw ? JSON.parse(raw) : { url: DEFAULT_WEB_APP_URL };
    if(!config.url) config.url = DEFAULT_WEB_APP_URL;
  }catch(e){ config = { url: DEFAULT_WEB_APP_URL }; }
}
function saveConfig(){
  try{ localStorage.setItem(CONFIG_KEY, JSON.stringify(config)); }catch(e){}
}
function configReady(){ return !!config.url; }

/* ================= API layer (talks to Apps Script) ================= */
function setSync(mode){
  const dot = document.getElementById('syncDot'), label = document.getElementById('syncLabel');
  if(!dot) return;
  dot.className = 'sync-dot' + (mode==='busy'?' busy':mode==='err'?' err':'');
  label.textContent = mode==='busy' ? '同步中...' : mode==='err' ? '同步失败' : '已同步';
}
async function api(action, payload){
  setSync('busy');
  try{
    let res;
    if(action==='getAll' || action==='getCalendarEvents'){
      const params = new URLSearchParams(Object.assign({action, idToken}, payload||{}));
      res = await fetch(config.url + '?' + params.toString());
    } else {
      res = await fetch(config.url, {
        method:'POST',
        body: JSON.stringify(Object.assign({action, idToken}, payload||{}))
      });
    }
    const data = await res.json();
    if(data.error){
      setSync('err'); console.error(data.error);
      if(data.error==='unauthorized') showGate('登入已过期或此帐号不在白名单内，请重新登入');
      return null;
    }
    setSync('ok');
    return data;
  }catch(e){
    setSync('err');
    console.error(e);
    return null;
  }
}

function transformRaw(raw){
  const habitLogByHabit = {};
  (raw.habitLog||[]).forEach(r=>{
    if(!habitLogByHabit[r.habitId]) habitLogByHabit[r.habitId] = {};
    habitLogByHabit[r.habitId][r.date] = true;
  });
  const habits = (raw.habits||[]).map(h=>({ id:h.id, name:h.name, log: habitLogByHabit[h.id]||{} }));
  const notes = {};
  (raw.notes||[]).forEach(n=>{ notes[n.date] = n.text; });
  return {
    tasks: (raw.tasks||[]).map(t=>({...t, priority: t.priority===true||t.priority==='true', done: t.done===true||t.done==='true'})),
    categories: (raw.categories||[]).map(c=>({...c, builtin: c.builtin===true||c.builtin==='true'})),
    habits, notes,
    pomodoroLog: raw.pomodoroLog||[]
  };
}

async function refreshState(){
  const raw = await api('getAll');
  if(raw){
    state = transformRaw(raw);
    if(raw.whoami){ userEmail = raw.whoami; updateWhoamiBox(); }
  }
}
function updateWhoamiBox(){
  const box = document.getElementById('whoamiBox');
  if(box) box.innerHTML = `👤 ${escapeHtml(userEmail||'')}<button class="logout-btn" onclick="logout()">登出</button>`;
}

function catById(id){ return state.categories.find(c=>c.id===id) || state.categories.find(c=>c.id==='none') || {id:'none',name:'未分类',color:'#8a8f9c'}; }

/* ================= Drawer / routing ================= */
function toggleDrawer(){
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
  document.getElementById('hamburgerBtn').classList.toggle('open');
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('hamburgerBtn').classList.remove('open');
}
function navigate(r){ route = r; closeDrawer(); renderPage(); }

function renderPage(){
  document.querySelectorAll('.drawer a').forEach(a=>a.classList.toggle('active', a.dataset.route===route));
  const app = document.getElementById('app');
  if(!configReady() && route!=='settings'){ app.innerHTML = renderSetup(); return; }
  if(route==='home') app.innerHTML = renderHome();
  else if(route==='tasks') app.innerHTML = renderTasksPage();
  else if(route==='calendar') { app.innerHTML = renderCalendarPage(); loadCalendarEventsForVisibleMonth(); }
  else if(route==='pomodoro') app.innerHTML = renderPomodoroPage();
  else if(route==='habits') app.innerHTML = renderHabitsPage();
  else if(route==='history') app.innerHTML = renderHistoryPage();
  else if(route==='settings') app.innerHTML = renderSettingsPage();
}

/* ================= Setup screen ================= */
function renderSetup(){
  return `
  <div class="page-title">先接上后端</div>
  <div class="page-sub">这个网页需要连接你自己部署的 Apps Script 后端，才能读写数据和 Google Calendar</div>
  <div class="card">
    <h3>部署步骤</h3>
    <div class="setup-steps">
      1. 打开 Google Sheets 建一个空白表格，复制网址中 <code>/d/</code> 和 <code>/edit</code> 之间的 Sheet ID<br>
      2. 表格里加一个分页叫 <code>Whitelist</code>，A1 填 <code>email</code>，A2 起填允许登入的邮箱<br>
      3. 表格里 扩展功能 → Apps Script，贴上后端代码，填入 SHEET_ID 和 OAUTH_CLIENT_ID<br>
      4. 部署 → 新增部署 → 网页应用程序，执行身份「我」，存取权限「任何人」<br>
      5. 复制部署后的网址（结尾 /exec），贴到下面
    </div>
  </div>
  <div class="card">${renderSettingsForm()}</div>
  `;
}

function renderSettingsPage(){
  return `
  <div class="page-title">设置</div>
  <div class="page-sub">Apps Script Web App 的网址，只存在你这个浏览器里</div>
  <div class="card">${renderSettingsForm()}</div>
  `;
}
function renderSettingsForm(){
  return `
    <label class="field-label">Web App 网址</label>
    <input class="field-input" id="cfgUrl" placeholder="https://script.google.com/macros/s/.../exec" value="${escapeHtml(config.url)}">
    <button class="add-btn" onclick="saveSettingsForm()">保存</button>
  `;
}
async function saveSettingsForm(){
  config.url = document.getElementById('cfgUrl').value.trim();
  saveConfig();
  if(configReady() && idToken){
    await refreshState();
    navigate('home');
  } else {
    renderPage();
  }
}

/* ================= HOME ================= */
function renderHome(){
  const tk = todayKey();
  const doneToday = state.tasks.filter(t=>t.done && t.completedAt===tk).length;
  const totalOpen = state.tasks.filter(t=>!t.done).length;
  const focusToday = state.pomodoroLog.filter(p=>p.date===tk).length;
  const habitsToday = state.habits.filter(h=>h.log[tk]).length;
  return `
  <div class="page-title">${greeting()}</div>
  <div class="page-sub">${new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'})}</div>
  <div class="stat-grid">
    <div class="stat-box"><div class="stat-num">${doneToday}</div><div class="stat-label">今日完成任务</div></div>
    <div class="stat-box"><div class="stat-num">${focusToday}</div><div class="stat-label">今日专注次数</div></div>
    <div class="stat-box"><div class="stat-num">${habitsToday}/${state.habits.length||0}</div><div class="stat-label">今日习惯打卡</div></div>
  </div>
  <div class="card"><h3>快速添加任务</h3>${renderQuickAdd()}</div>
  <div class="shortcut-row">
    <div class="shortcut" onclick="navigate('tasks')"><span class="emoji">✅</span>全部任务 (${totalOpen})</div>
    <div class="shortcut" onclick="navigate('calendar')"><span class="emoji">📅</span>查看日历</div>
    <div class="shortcut" onclick="navigate('pomodoro')"><span class="emoji">⏱️</span>开始专注</div>
  </div>
  `;
}
function greeting(){ const h=new Date().getHours(); return h<11?'早上好':h<14?'中午好':h<18?'下午好':'晚上好'; }
function renderQuickAdd(){
  const opts = state.categories.map(c=>`<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
  return `
  <div class="add-bar">
    <input type="text" id="quickTaskText" placeholder="添加任务..." onkeydown="if(event.key==='Enter') quickAddTask()">
    <select id="quickTaskCat">${opts}</select>
    <button class="add-btn" onclick="quickAddTask()">添加</button>
  </div>`;
}
async function quickAddTask(){
  const input = document.getElementById('quickTaskText');
  const text = input.value.trim();
  if(!text) return;
  const categoryId = document.getElementById('quickTaskCat').value;
  await api('addTask', {task:{text, categoryId, priority:false, done:false, createdAt:todayKey(), completedAt:null, dueDate:''}});
  await refreshState(); renderPage();
}

/* ================= TASKS ================= */
function renderTasksPage(){
  const tabs = ['all', ...state.categories.map(c=>c.id)];
  const tabHtml = tabs.map(id=>{
    if(id==='all') return `<div class="tab ${taskFilter==='all'?'active':''}" onclick="setTaskFilter('all')">全部</div>`;
    const c = catById(id);
    return `<div class="tab ${taskFilter===id?'active':''}" onclick="setTaskFilter('${id}')"><span class="dot" style="background:${c.color}"></span>${escapeHtml(c.name)}</div>`;
  }).join('');
  const catOpts = state.categories.map(c=>`<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
  let items = state.tasks;
  if(taskFilter!=='all') items = items.filter(t=>t.categoryId===taskFilter);
  items = items.slice().sort((a,b)=> (a.done-b.done) || (b.priority-a.priority) || ((a.dueDate||'9999')<(b.dueDate||'9999')?-1:1));
  return `
  <div class="page-title">任务</div>
  <div class="page-sub">按类别管理，可选填截止日期同步到 Google Calendar</div>
  <div class="add-bar">
    <input type="text" id="newTaskText" placeholder="添加一个任务..." onkeydown="if(event.key==='Enter') addTask()">
    <select id="newTaskCat">${catOpts}</select>
    <input type="date" id="newTaskDue" title="截止日期（可选）">
    <label class="star"><input type="checkbox" id="newTaskStar"> ⭐ 重要</label>
    <button class="add-btn" onclick="addTask()">添加</button>
  </div>
  <div class="tabs">${tabHtml}<div class="gear-btn" onclick="toggleCatManage()">⚙ 管理类别</div></div>
  <div class="cat-manage" id="catManage">${renderCatManage()}</div>
  <div class="card">${items.length ? items.map(renderTaskRow).join('') : '<div class="empty">这里还没有任务</div>'}</div>
  `;
}
function renderTaskRow(t){
  const c = catById(t.categoryId);
  return `
  <div class="task ${t.done?'done':''}" style="border-left-color:${c.color}">
    <button class="check" style="${t.done?`background:${c.color};border-color:${c.color};color:#12141c`:''}" onclick="toggleTask('${t.id}')">${t.done?'✓':''}</button>
    <div class="task-body">
      <div class="task-text">${t.priority?'⭐ ':''}${escapeHtml(t.text)}</div>
      <div class="task-meta">${escapeHtml(c.name)}${t.dueDate?' · 截止 '+t.dueDate:''}</div>
    </div>
    <button class="task-del" onclick="deleteTask('${t.id}')">✕</button>
  </div>`;
}
function setTaskFilter(id){ taskFilter=id; renderPage(); }
async function addTask(){
  const input = document.getElementById('newTaskText');
  const text = input.value.trim();
  if(!text) return;
  const categoryId = document.getElementById('newTaskCat').value;
  const priority = document.getElementById('newTaskStar').checked;
  const dueDate = document.getElementById('newTaskDue').value;
  await api('addTask', {task:{text, categoryId, priority, done:false, createdAt:todayKey(), completedAt:null, dueDate}});
  await refreshState(); renderPage();
  calEventsCache = {};
}
async function toggleTask(id){
  const t = state.tasks.find(t=>t.id===id);
  if(!t) return;
  const done = !t.done;
  await api('updateTask', {task:{id, done, completedAt: done?todayKey():''}});
  await refreshState(); renderPage();
}
async function deleteTask(id){
  await api('deleteTask', {id});
  await refreshState(); renderPage();
  calEventsCache = {};
}

/* ---- category management ---- */
function toggleCatManage(){ document.getElementById('catManage').classList.toggle('show'); }
function renderCatManage(){
  const rows = state.categories.map(c=>`
    <div class="cat-row">
      <span class="dot" style="background:${c.color}; width:12px; height:12px; border-radius:50%;"></span>
      <input class="cat-name" value="${escapeHtml(c.name)}" ${c.builtin?'disabled':''} onblur="renameCategory('${c.id}', this.value)">
      ${c.builtin?'':`<button class="del-cat" onclick="deleteCategory('${c.id}')">✕</button>`}
    </div>`).join('');
  const swatches = PALETTE.map(p=>`<div class="swatch ${newCatColor===p.hex?'sel':''}" style="background:${p.hex}" onclick="pickNewCatColor('${p.hex}')"></div>`).join('');
  return `
    <div class="cat-list">${rows}</div>
    <div class="swatches">${swatches}</div>
    <div class="new-cat-row"><input type="text" id="newCatName" placeholder="新类别名称..."><button onclick="addCategory()">添加类别</button></div>
  `;
}
function pickNewCatColor(hex){ newCatColor = hex; document.getElementById('catManage').innerHTML = renderCatManage(); }
async function addCategory(){
  const input = document.getElementById('newCatName');
  const name = input.value.trim();
  if(!name) return;
  await api('addCategory', {category:{name, color:newCatColor, builtin:false}});
  await refreshState(); renderPage();
  document.getElementById('catManage').classList.add('show');
}
async function renameCategory(id, value){
  const c = state.categories.find(c=>c.id===id);
  if(c && value.trim() && value.trim()!==c.name){
    await api('updateCategory', {category:{id, name:value.trim(), color:c.color, builtin:c.builtin}});
    await refreshState();
  }
}
async function deleteCategory(id){
  await api('deleteCategory', {id});
  await refreshState(); renderPage();
  document.getElementById('catManage').classList.add('show');
}

/* ================= POMODORO ================= */
function renderPomodoroPage(){
  const tk = todayKey();
  const todaySessions = state.pomodoroLog.filter(p=>p.date===tk).slice().reverse();
  return `
  <div class="page-title">番茄钟</div>
  <div class="page-sub">专注 25 分钟，休息 5 分钟</div>
  <div class="card">
    <input type="text" class="pomo-label-input" id="pomoLabelInput" placeholder="这段时间要专注在什么？" value="${escapeHtml(pomoLabel)}" oninput="pomoLabel=this.value">
    <div class="pomo-mode" id="pomoModeLabel">${pomoMode==='focus'?'专注 · FOCUS':'休息 · BREAK'}</div>
    <div class="pomo-time" id="pomoDisplay">${formatPomo()}</div>
    <div class="pomo-btns">
      <button class="primary" onclick="pomoToggle()" id="pomoToggleBtn">${pomoRunning?'暂停':'开始'}</button>
      <button onclick="pomoReset()">重置</button>
    </div>
  </div>
  <div class="card"><h3>今天的专注记录</h3>
    ${todaySessions.length ? todaySessions.map(s=>`<div class="pomo-session"><span>${escapeHtml(s.label||'（未命名）')}</span><span class="t">${s.time} · ${s.durationMin}分钟</span></div>`).join('') : '<div class="empty">今天还没有完成的专注时段</div>'}
  </div>
  `;
}
function formatPomo(){ const m=Math.floor(pomoSeconds/60), s=pomoSeconds%60; return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }
function pomoToggle(){
  pomoRunning = !pomoRunning;
  if(pomoRunning){
    pomoInterval = setInterval(async ()=>{
      pomoSeconds--;
      if(pomoSeconds<=0){
        if(pomoMode==='focus'){
          const now = new Date();
          await api('addPomodoro', {session:{label:pomoLabel.trim(), date:todayKey(), time:now.toTimeString().slice(0,5), durationMin:25}});
          await refreshState();
          pomoMode='break'; pomoSeconds=5*60;
        } else { pomoMode='focus'; pomoSeconds=25*60; }
        if(route==='pomodoro') renderPage();
      }
      updatePomoDisplay();
    },1000);
  } else { clearInterval(pomoInterval); }
  updatePomoDisplay();
}
function pomoReset(){ clearInterval(pomoInterval); pomoRunning=false; pomoMode='focus'; pomoSeconds=25*60; updatePomoDisplay(); }
function updatePomoDisplay(){
  const disp=document.getElementById('pomoDisplay'), btn=document.getElementById('pomoToggleBtn'), label=document.getElementById('pomoModeLabel');
  if(disp) disp.textContent=formatPomo();
  if(btn) btn.textContent=pomoRunning?'暂停':'开始';
  if(label) label.textContent=pomoMode==='focus'?'专注 · FOCUS':'休息 · BREAK';
}

/* ================= HABITS ================= */
function renderHabitsPage(){
  return `
  <div class="page-title">习惯打卡</div>
  <div class="page-sub">追踪最近 14 天的完成情况</div>
  <div class="card">
    ${renderHabitList()}
    <div class="add-habit"><input type="text" id="newHabitName" placeholder="新习惯，比如「阅读」" onkeydown="if(event.key==='Enter') addHabit()"><button onclick="addHabit()">添加</button></div>
  </div>
  `;
}
function renderHabitList(){
  if(state.habits.length===0) return '<div class="empty">还没有习惯，添加一个开始吧</div>';
  const days=[]; for(let i=13;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); days.push(todayKey(d)); }
  return state.habits.map(h=>{
    const streak = computeStreak(h);
    const cells = days.map(dk=>{
      const on = !!h.log[dk], isToday = dk===todayKey();
      return `<div class="habit-cell ${on?'on':''} ${isToday?'today':''}" onclick="toggleHabit('${h.id}','${dk}')"></div>`;
    }).join('');
    return `<div class="habit-row"><div class="habit-name">${escapeHtml(h.name)}</div><div class="habit-grid">${cells}</div><div class="streak">🔥${streak}</div><button class="del-habit" onclick="deleteHabit('${h.id}')">✕</button></div>`;
  }).join('');
}
function computeStreak(h){ let streak=0, d=new Date(); while(h.log[todayKey(d)]){ streak++; d.setDate(d.getDate()-1); } return streak; }
async function addHabit(){
  const input=document.getElementById('newHabitName');
  const name=input.value.trim();
  if(!name) return;
  await api('addHabit', {habit:{name}});
  await refreshState(); renderPage();
}
async function toggleHabit(id,dateKey){
  await api('toggleHabitLog', {habitId:id, date:dateKey});
  await refreshState(); renderPage();
  calEventsCache = {};
}
async function deleteHabit(id){
  await api('deleteHabit', {id});
  await refreshState(); renderPage();
}

/* ================= CALENDAR ================= */
function monthKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function renderCalendarPage(){
  const y = calVisibleMonth.getFullYear(), m = calVisibleMonth.getMonth();
  const firstDay = new Date(y,m,1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const dowLabels = ['日','一','二','三','四','五','六'];

  let cells = '';
  for(let i=0;i<startWeekday;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let day=1; day<=daysInMonth; day++){
    const d = new Date(y,m,day);
    const dk = todayKey(d);
    const isToday = dk===todayKey();
    const isSelected = dk===calSelectedDate;
    const dueTasks = state.tasks.filter(t=>t.dueDate===dk);
    const dots = dueTasks.slice(0,4).map(t=>`<div class="d" style="background:${catById(t.categoryId).color}"></div>`).join('');
    const habitOn = state.habits.some(h=>h.log[dk]);
    const gEvents = (calEventsCache[monthKey(calVisibleMonth)]||[]).filter(e=>e.date===dk);
    cells += `
    <div class="cal-cell ${isToday?'today':''} ${isSelected?'selected':''}" onclick="selectCalDay('${dk}')">
      ${gEvents.length?'<div class="cal-evt-mark">🔵</div>':''}
      <div class="cal-daynum">${day}${habitOn?' 🔥':''}</div>
      <div class="cal-dots">${dots}</div>
    </div>`;
  }
  return `
  <div class="page-title">日历</div>
  <div class="page-sub">任务截止日期 + 你 Google Calendar 上的真实事件</div>
  <div class="cal-nav">
    <button onclick="shiftMonth(-1)">‹ 上个月</button>
    <div class="cal-month-label">${y} 年 ${m+1} 月</div>
    <button onclick="shiftMonth(1)">下个月 ›</button>
  </div>
  <div class="cal-grid">
    ${dowLabels.map(l=>`<div class="cal-dow">${l}</div>`).join('')}
    ${cells}
  </div>
  <div class="day-detail" id="dayDetail">${renderDayDetail(calSelectedDate)}</div>
  `;
}
function shiftMonth(delta){
  calVisibleMonth = new Date(calVisibleMonth.getFullYear(), calVisibleMonth.getMonth()+delta, 1);
  renderPage();
}
function selectCalDay(dk){ calSelectedDate = dk; renderPage(); }
function renderDayDetail(dk){
  const dueTasks = state.tasks.filter(t=>t.dueDate===dk);
  const habitHits = state.habits.filter(h=>h.log[dk]);
  const gEvents = (calEventsCache[monthKey(calVisibleMonth)]||[]).filter(e=>e.date===dk);
  return `
  <div class="card">
    <div class="day-detail-title">${dk}</div>
    ${dueTasks.length ? dueTasks.map(renderTaskRow).join('') : ''}
    ${gEvents.length ? gEvents.map(e=>`<div class="cal-evt-row google"><span>${e.allDay?'🔵':'🔵'} ${escapeHtml(e.title)}</span><span class="t">${e.allDay?'全天':e.timeLabel}</span></div>`).join('') : ''}
    ${habitHits.length ? `<div class="task-meta" style="margin-top:8px;">🔥 打卡习惯：${habitHits.map(h=>escapeHtml(h.name)).join('、')}</div>` : ''}
    ${(!dueTasks.length && !gEvents.length && !habitHits.length) ? '<div class="empty">这天没有任务、事件或打卡记录</div>' : ''}
  </div>`;
}
async function loadCalendarEventsForVisibleMonth(){
  const mk = monthKey(calVisibleMonth);
  if(calEventsCache[mk]) return;
  const y = calVisibleMonth.getFullYear(), m = calVisibleMonth.getMonth();
  const start = new Date(y,m,1).toISOString();
  const end = new Date(y,m+1,1).toISOString();
  const data = await api('getCalendarEvents', {start, end});
  if(data){
    calEventsCache[mk] = data.map(e=>{
      const startDt = new Date(e.start);
      return { ...e, date: todayKey(startDt), timeLabel: startDt.toTimeString().slice(0,5) };
    });
    if(route==='calendar') renderPage();
  }
}

/* ================= HISTORY ================= */
let historyFilter = 'all';
function renderHistoryPage(){
  const events = buildHistoryEvents();
  const filtered = historyFilter==='all' ? events : events.filter(e=>e.type===historyFilter);
  const tabs = [['all','全部'],['task','任务'],['pomodoro','番茄钟'],['habit','习惯']];
  return `
  <div class="page-title">历史记录</div>
  <div class="page-sub">你最近的任务、专注与习惯活动</div>
  <div class="tabs">${tabs.map(([id,label])=>`<div class="tab ${historyFilter===id?'active':''}" onclick="setHistoryFilter('${id}')">${label}</div>`).join('')}</div>
  <div class="card">${filtered.length ? filtered.slice(0,80).map(renderHistItem).join('') : '<div class="empty">暂时没有记录</div>'}</div>
  `;
}
function setHistoryFilter(id){ historyFilter=id; renderPage(); }
function buildHistoryEvents(){
  const events=[];
  state.tasks.filter(t=>t.done && t.completedAt).forEach(t=>{
    events.push({type:'task', icon:'✅', date:t.completedAt, text:`完成任务「${t.text}」`, sortKey:t.completedAt+'T12:00'});
  });
  state.pomodoroLog.forEach(p=>{
    events.push({type:'pomodoro', icon:'⏱️', date:p.date, text:`专注 ${p.durationMin} 分钟${p.label?'：'+p.label:''}`, sortKey:p.date+'T'+p.time});
  });
  state.habits.forEach(h=>{
    Object.keys(h.log).forEach(dk=>{ events.push({type:'habit', icon:'🔥', date:dk, text:`打卡习惯「${h.name}」`, sortKey:dk+'T09:00'}); });
  });
  events.sort((a,b)=> a.sortKey < b.sortKey ? 1 : -1);
  return events;
}
function renderHistItem(e){
  const bg = e.type==='task'?'var(--sage)':e.type==='pomodoro'?'var(--amber)':'var(--rose)';
  return `<div class="hist-item"><div class="hist-icon" style="background:${bg}22;">${e.icon}</div><div class="hist-body"><div class="hist-text">${escapeHtml(e.text)}</div><div class="hist-time">${e.date}</div></div></div>`;
}

/* ================= Google Sign-In gate ================= */
function onGsiLoad(){
  google.accounts.id.initialize({ client_id: CLIENT_ID, callback: handleCredentialResponse });
  google.accounts.id.renderButton(document.getElementById('gSignInBtn'), { theme:'filled_black', size:'large', shape:'pill' });
}
async function handleCredentialResponse(response){
  idToken = response.credential;
  document.getElementById('gateScreen').style.display = 'none';
  document.getElementById('appShell').style.display = '';
  if(configReady()){
    await refreshState();
    if(userEmail){ route='home'; renderPage(); }
  } else {
    route = 'settings';
    renderPage();
  }
}
function showGate(message){
  idToken = null; userEmail = null;
  document.getElementById('gateScreen').style.display = 'flex';
  document.getElementById('appShell').style.display = 'none';
  const msg = document.getElementById('gateMessage');
  if(msg) msg.textContent = message || '请使用 Google 账号登入';
}
function logout(){
  if(window.google && google.accounts) google.accounts.id.disableAutoSelect();
  showGate('已登出，请重新登入');
}

/* ---------- Init ---------- */
(async function init(){
  await loadConfig();
})();
